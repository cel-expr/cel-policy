name: "context_pb"

imports:
   - name: cel.expr.conformance.proto3.TestAllTypes
   - name: cel.expr.conformance.proto3.TestAllTypes.NestedEnum

rule:
  match:
    - condition: >
        single_int32 > cel.expr.conformance.proto3.TestAllTypes{single_int64: 10}.single_int64
      output: |
        "invalid spec, got single_int32=" + string(single_int32) + ", wanted <= 10"
    - condition: >
        standalone_enum == cel.expr.conformance.proto3.TestAllTypes.NestedEnum.BAR ||
        cel.expr.conformance.proto3.TestAllTypes.NestedEnum.BAZ in repeated_nested_enum
      output: |
        "invalid spec, neither nested nor repeated enums may refer to BAR or BAZ"
