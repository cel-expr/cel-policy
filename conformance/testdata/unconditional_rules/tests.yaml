description: Unconditional rules propagation conformance tests
section:
  - name: "composition"
    tests:
      - name: "case_a_true_b_true"
        input:
          a:
            expr: "true"
          b:
            expr: "true"
          c:
            expr: "true"
        output:
          expr: "1"
      - name: "case_a_true_b_false"
        input:
          a:
            expr: "true"
          b:
            expr: "false"
          c:
            expr: "true"
        output:
          expr: "2"
      - name: "case_a_false_c_true"
        input:
          a:
            expr: "false"
          b:
            expr: "false"
          c:
            expr: "true"
        output:
          expr: "3"
      - name: "case_a_false_c_false"
        input:
          a:
            expr: "false"
          b:
            expr: "false"
          c:
            expr: "false"
        output:
          expr: "4"
