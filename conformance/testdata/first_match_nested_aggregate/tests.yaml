description: Bidirectional scoping conformance tests nesting aggregate inside first_match parent
section:
  - name: "basic"
    tests:
      - name: "all_true"
        input:
          cond1:
            value: true
          cond2:
            value: true
          cond3:
            value: true
        output:
          value: ["A", "B"]
      - name: "fallback_outer"
        input:
          cond1:
            value: false
          cond2:
            value: true
          cond3:
            value: true
        output:
          value: ["FALLBACK"]
      - name: "nested_failed_to_empty"
        input:
          cond1:
            value: true
          cond2:
            value: false
          cond3:
            value: false
        output:
          value: []
