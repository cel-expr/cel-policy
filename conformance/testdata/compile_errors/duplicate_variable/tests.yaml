name: "errors_duplicate_variable"
description: "Tests for duplicate variables in policy compilation"
sections:
- name: "compile"
  tests:
  - name: "overlapping_identifier"
    output:
      error_set:
      # Java: overlapping declaration name 'variables.want' (type 'int' cannot be distinguished from 'string')
      # Go: invalid variable declaration: overlapping identifier for name 'variables.want'
      - "overlapping"
