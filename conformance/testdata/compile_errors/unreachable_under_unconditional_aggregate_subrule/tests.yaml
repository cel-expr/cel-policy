name: "unreachable_under_unconditional_aggregate_subrule"
description: "Tests that dead code is flagged when a first_match rule has an unconditional aggregate subrule followed by another match"
sections:
- name: "compile"
  tests:
  - name: "unreachable_match"
    output:
      error_set:
      - "rule creates unreachable outputs"
