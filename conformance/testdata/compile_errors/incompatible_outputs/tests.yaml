name: "errors_incompatible_outputs"
description: "Tests for incompatible outputs in policy compilation"
sections:
- name: "compile"
  tests:
  - name: "incompatible_output_types"
    output:
      error_set:
      # Java: incompatible output types: block has output type optional_type(string), but previous outputs have type bool
      # Go: incompatible output types: block has output type string, but previous outputs have type bool
      - "incompatible output types: block has output type"
