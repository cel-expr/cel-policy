name: "aggregate_nested_mixed_semantics_error"
description: "Tests that nested first_match subrule under an aggregate outer rule correctly formats its type mismatch errors on raw unwrapped types instead of leaked list wrapper"
sections:
- name: "compile"
  tests:
  - name: "mixed_semantics_type_error"
    output:
      error_set:
      - "incompatible output types: block has output type int, but previous outputs have type string"
