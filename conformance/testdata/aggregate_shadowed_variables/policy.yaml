name: aggregate_shadowed_variables
rule:
  variables:
    - name: "x"
      expression: "10"
  aggregate:
    - condition: "resource.cond1 == true"
      emit: "variables.x"
    - condition: "resource.cond2 == true"
      rule:
        variables:
          - name: "x"
            expression: "20"
        match:
          - condition: "true"
            output: "variables.x"
